# Blog Digest Configuration
# Add RSS feeds to track here

feeds:
  # Kubernetes & Cloud Native
  - name: "Kubernetes Blog"
    url: "https://kubernetes.io/feed.xml"
  - name: "CNCF Blog"
    url: "https://www.cncf.io/blog/feed/"
  - name: "Kubernetes subreddit"
    url: "https://www.reddit.com/r/kubernetes/.rss"
  - name: "Learnk8s Blog"
    url: "https://learnk8s.io/rss.xml"
  - name: "Pulumi Blog"
    url: "https://www.pulumi.com/blog/rss.xml"
  - name: "Stdeer Blog"
    url: "https://blog.stderr.at/index.xml"
  - name: "Red Hat Cloud Blog"
    url: "https://cloud.redhat.com/blog/rss.xml"
  - name: "Netapp Trident Releases"
    url: "https://github.com/netApp/trident/releases.atom"

  # DevOps & Infrastructure
  - name: "Hacker News (Top)"
    url: "https://hnrss.org/best?count=20"
  - name: "Fedora Magazine"
    url: "https://fedoramagazine.org/feed/"
  - name: "GCP Blog"
    url: "https://cloudblog.withgoogle.com/rss"
  - name: "Argo Project Blog"
    url: "https://blog.argoproj.io/feed"
    ssl_verify: false  # server sends incomplete cert chain
  - name: "Grafana Blog"
    url: "https://grafana.com/blog/index.xml"
  - name: "OpenTelemtry Blog"
    url: "https://opentelemetry.io/blog/index.xml"
  - name: "Jeff Geerling's Blog"
    url: "https://www.jeffgeerling.com/blog.xml"

# AI Settings
ai:
  ollama:
    base_url: "http://localhost:11434"
    model: "llama3.2:3b"
    timeout: 450  # seconds; larger models may need more time
    thinking: false  # set true to enable extended thinking (supported by some models)

# Summary settings
summary:
  max_articles_per_feed: 5
  max_age_hours: 24
  max_summary_length: 200  # words per article
  max_labels: 5             # max keyword/topic labels per article

# User profile – teach the AI about your interests
# Articles that match these will be tagged "For you"
user_profile:
  interests:
    - kubernetes
    - containerization
    - open source
    - monitoring
    - otlp

# Output
output:
  directory: "./docs"

# Schedule
schedule:
  cron: "0 7 * * *"          # standard cron format: min hour day month weekday
  timezone: "Europe/Berlin"

